services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # Manager principal des notifications
    App\NotificationBundle\Service\NotificationManager:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        public: true

    # Service de notification (legacy support)
    App\NotificationBundle\Service\NotificationService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        public: true

    # Repository
    App\Repository\NotificationRepository: ~

    # Controller
    App\NotificationBundle\Controller\NotificationController:
        arguments:
            $notificationRepository: '@App\Repository\NotificationRepository'
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['controller.service_arguments']
        public: true
