# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    profile_photos_directory: '%kernel.project_dir%/public/uploads/profiles'
    openai.api_key: '%env(OPENAI_API_KEY)%'
    openai.use_mock: '%env(bool:OPENAI_USE_MOCK)%'
    openAiApiKey: '%env(OPENAI_API_KEY)%'
    app.tagging.category_embeddings:
        machine_learning:
            label: 'machine learning'
            embedding: [0.1, 0.2, 0.3]
        web_development:
            label: 'web development'
            embedding: [0.2, 0.1, 0.4]
        data_science:
            label: 'data science'
            embedding: [0.3, 0.25, 0.15]

    env(EMBEDDING_API_ENDPOINT): ''
    env(EMBEDDING_API_KEY): ''

    firebase.server_key: '%env(FIREBASE_SERVER_KEY)%'
    translation.provider: '%env(TRANSLATION_PROVIDER)%'
    translation.deepl_api_key: '%env(DEEPL_API_KEY)%'
    translation.google_api_key: '%env(GOOGLE_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Repository\:
        resource: '../src/Repository'
        autowire: true
        autoconfigure: true

    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%profile_photos_directory%'

    App\Service\AiAssistantService:
        arguments:
            $apiKey: '%openai.api_key%'
            $useMockData: '%openai.use_mock%'

    App\Service\AiProfileGenerator:
        arguments:
            $apiKey: '%openai.api_key%'
            $useMock: '%openai.use_mock%'

    App\EventSubscriber\LocaleSubscriber:
        arguments:
            $defaultLocale: '%kernel.default_locale%'

    # Expéditeur des emails
    App\Service\EmailService:
        arguments:
            $fromEmail: '%env(MAILER_FROM_EMAIL)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    # Google Perspective API Moderation Service
    App\Service\Moderation\ModerationService:
        arguments:
            $apiKey: '%env(PERSPECTIVE_API_KEY)%'
            $toxicityThreshold: '%env(float:PERSPECTIVE_TOXICITY_THRESHOLD)%'
            $moderationLogger: '@monolog.logger.moderation'

    # TF-IDF based tagging strategy
    App\Service\Tagging\TfIdfTaggingService:
        arguments:
            $maxTags: 2

    # Embedding-based tagging strategy (semantic)
    App\Service\Tagging\EmbeddingTaggingService:
        arguments:
            $categoryEmbeddings: '%app.tagging.category_embeddings%'
            $embeddingApiEndpoint: '%env(EMBEDDING_API_ENDPOINT)%'
            $embeddingApiKey: '%env(EMBEDDING_API_KEY)%'
            $maxTags: 2

    # Tagging manager to select the active strategy
    App\Service\Tagging\TaggingManager:
        arguments:
            $defaultStrategy: 'tfidf'

    # Firebase Notification Service
    App\Service\FirebaseNotificationService:
        arguments:
            $firebaseServerKey: '%firebase.server_key%'

    # Mention Detector Service
    App\Service\MentionDetector:
        autowire: true
        autoconfigure: true

    # Translation Service
    App\Service\TranslationService:
        arguments:
            $translationProvider: '%translation.provider%'
            $deeplApiKey: '%translation.deepl_api_key%'
            $googleApiKey: '%translation.google_api_key%'
